<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#F9F9F7"/>
  <!-- Header -->
  <rect width="1200" height="80" fill="#1A1A1A"/>
  <rect x="32" y="24" width="40" height="40" fill="#B85C38" rx="2"/>
  <text x="52" y="50" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">DKS</text>
  <!-- Hero -->
  <rect y="80" width="1200" height="380" fill="#2a2a2a"/>
  <text x="80" y="240" font-family="sans-serif" font-size="60" font-weight="900" fill="#fff">A NEW</text>
  <text x="80" y="310" font-family="sans-serif" font-size="60" font-weight="900" fill="#B85C38">BEGINNING</text>
  <text x="80" y="380" font-family="sans-serif" font-size="60" font-weight="900" fill="#fff">IN YOUR DREAM HOME</text>
  <!-- Listings section -->
  <rect y="460" width="1200" height="260" fill="#F9F9F7"/>
  <text x="60" y="510" font-family="sans-serif" font-size="9" font-weight="700" fill="#B85C38" letter-spacing="4">SELECTED COLLECTION</text>
  <text x="60" y="550" font-family="sans-serif" font-size="40" font-weight="900" fill="#1A1A1A">PREMIUM LISTINGS</text>
  <!-- 3 cards -->
  <rect x="60" y="580" width="340" height="120" fill="#e8e8e6" rx="1"/>
  <rect x="430" y="580" width="340" height="120" fill="#e8e8e6" rx="1"/>
  <rect x="800" y="580" width="340" height="120" fill="#e8e8e6" rx="1"/>
  <!-- Features bar -->
  <rect y="720" width="1200" height="180" fill="#1A1A1A"/>
  <text x="600" y="800" font-family="sans-serif" font-size="36" font-weight="900" fill="#fff" text-anchor="middle">WHY CHOOSE <tspan fill="#B85C38">DKS</tspan></text>
</svg>
